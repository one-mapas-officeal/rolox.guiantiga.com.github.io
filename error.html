<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ROLOX | Sistema de Erro</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #444; padding: 30px; background: #111; }
        .val { color: #ff3333; font-weight: bold; }
        .btn-container { margin-top: 30px; display: flex; gap: 15px; }
        button { padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
        .btn-continue { background: #0056b3; color: white; }
        .btn-back { background: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="error-title">ERRO DETECTADO</h1>
    <p>Local: <span id="url-display" class="val"></span></p>
    <p>Status do Erro: <span id="error-msg" class="val"></span></p>

    <div class="btn-container">
        <button class="btn-continue" onclick="continuar()">Continuar assim mesmo</button>
        <button class="btn-back" onclick="window.history.back()">Voltar</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url-display') || 'N/A';
    const num = params.get('numbre-error');
    
    document.getElementById('url-display').innerText = url;

    // Lógica dos erros (0 a 10)
    const errors = {
        '0': 'A próxima página está fora do ar',
        '1': 'Página com bugs de textura',
        '2': 'Erro de carregamento',
        '3': 'A página caiu',
        '4': 'Essa conta está sendo usada',
        '5': 'Erro em algumas capturas',
        '6': 'Erro de jogo',
        '7': 'Erro de carregamento em jogos',
        '8': 'Erro de página desconhecida',
        '9': 'Erro de jogo desconhecido',
        '10': 'Erro 204: Offline por 20 minutos'
    };

    document.getElementById('error-msg').innerText = errors[num] || 'Erro desconhecido (' + num + ')';

    function continuar() {
        if (url !== 'N/A') window.location.href = url;
    }
</script>

</body>
</html>
