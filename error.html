<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ROLOX | Erro</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #444; padding: 30px; }
        .val { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>SISTEMA DE ERROS</h1>
    <p>Local: <span id="url-display" class="val"></span></p>
    <p>Erro: <span id="error-display" class="val"></span></p>
    <p>Descrição: <span id="desc-display" class="val"></span></p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    document.getElementById('url-display').innerText = params.get('pageorurl') || 'Desconhecido';
    document.getElementById('error-display').innerText = params.get('error') || 'Erro não especificado';
    document.getElementById('desc-display').innerText = params.get('descrisao') || 'Nenhuma descrição fornecida.';
</script>

</body>
</html>
